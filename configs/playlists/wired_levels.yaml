playlist:
  id: wired_levels
  name: WIRED Levels
  url: https://www.youtube.com/playlist?list=PLibNZv5Zd0dz-S1M_zimRtPCIQg6Fcd8x

pipeline:
  segmentation_strategy: generic
  normalized_buckets:
    - child
    - teen
    - college_student
    - grad_student
    - expert
  download_media: false
  media_output_dir: data/raw/media/wired_levels
  transcript_languages: [en]
  manual_transcript_first: true
  transcript_request_delay_seconds: 2.0
  segmentation:
    low_confidence_threshold: 0.55
  topic_overrides: {}
  llm_topic_fallback:
    enabled: false
  yt_dlp:
    extract_flat: true

output:
  raw_playlist_path: data/raw/playlists/wired_levels.json
  raw_transcript_dir: data/raw/transcripts
  processed_long_path: data/processed/long/wired_levels.jsonl
  processed_wide_path: data/processed/wide/wired_levels.csv
  review_low_confidence_path: data/processed/review/wired_levels_low_confidence.jsonl
  write_parquet: false
  long_parquet_path: data/processed/long/wired_levels.parquet
  wide_parquet_path: data/processed/wide/wired_levels.parquet